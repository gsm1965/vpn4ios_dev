<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="С Богом!">
<title>С Богом!</title>
<style>
*, *:before, *:after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
html, body { height: 100%; }
body {
  font-family: Georgia, 'Times New Roman', serif;
  background-color: #f9f6f0;
  min-height: 100%;
  color: #2a0a00;
  display: -webkit-box; display: -ms-flexbox; display: flex;
  -webkit-box-orient: vertical; -webkit-box-direction: normal;
  -ms-flex-direction: column; flex-direction: column;
  -webkit-box-align: center; -ms-flex-align: center; align-items: center;
}

/* ── Экраны ── */
.screen {
  display: none;
  -webkit-box-orient: vertical; -webkit-box-direction: normal;
  -ms-flex-direction: column; flex-direction: column;
  -webkit-box-align: center; -ms-flex-align: center; align-items: center;
  -webkit-box-pack: center; -ms-flex-pack: center; justify-content: center;
  -webkit-box-flex: 1; -ms-flex: 1; flex: 1;
  width: 100%; max-width: 520px; padding: 24px 16px 8px;
  text-align: center;
}
.screen.active {
  display: -webkit-box; display: -ms-flexbox; display: flex;
}
#screen-proxy {
  -webkit-box-pack: start; -ms-flex-pack: start; justify-content: flex-start;
  padding-top: 28px;
}

/* ── Крест и заголовок ── */
.cross {
  font-size: 2.8em; color: #8b0000;
  margin-bottom: 6px;
  text-shadow: 1px 2px 3px rgba(0,0,0,0.25);
}
h1 {
  color: #8b0000; font-size: 1.5em; letter-spacing: 0.03em;
  margin-bottom: 18px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.8);
}

/* ── Карточка ── */
.card {
  background: rgba(249,246,240,0.94);
  border: 1px solid #c9a96e;
  border-radius: 8px;
  padding: 22px 20px 18px;
  width: 100%;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
}
.question {
  color: #8b0000; font-style: italic;
  margin-bottom: 14px; font-size: 1.05em; line-height: 1.4;
}

/* ── Поля ввода ── */
input[type="text"], input[type="url"] {
  width: 100%; padding: 10px 12px;
  font-size: 1em; font-family: Georgia, serif;
  border: 2px solid #c9a96e; border-radius: 5px;
  background: #fffdf8; color: #2a0a00;
  outline: none; margin-bottom: 10px;
  -webkit-appearance: none;
}
input[type="text"]:focus, input[type="url"]:focus { border-color: #8b0000; }
.input-row {
  display: -webkit-box; display: -ms-flexbox; display: flex;
  gap: 8px; -webkit-box-align: center; -ms-flex-align: center; align-items: center;
}
.input-row input { -webkit-box-flex: 1; -ms-flex: 1; flex: 1; margin-bottom: 0; }

/* ── Кнопки — псевдо-3D ── */
.btn {
  display: inline-block;
  background: -webkit-linear-gradient(top, #b00000, #700000);
  background: linear-gradient(to bottom, #b00000, #700000);
  border: 1px solid #500000;
  border-bottom: 3px solid #380000;
  box-shadow: 0 2px 5px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.18);
  color: #f5e6c8; font-family: Georgia, serif; font-size: 1em;
  border-radius: 5px; cursor: pointer;
  padding: 10px 18px; min-width: 46px;
  -webkit-appearance: none; text-shadow: 0 1px 1px rgba(0,0,0,0.4);
}
.btn:active {
  border-bottom-width: 1px;
  -webkit-transform: translateY(2px); transform: translateY(2px);
  box-shadow: 0 1px 2px rgba(0,0,0,0.35);
}

/* ── История ── */
#history-list {
  margin-top: 14px; text-align: left;
  max-height: 44vh; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.hist-item {
  display: -webkit-box; display: -ms-flexbox; display: flex;
  -webkit-box-align: center; -ms-flex-align: center; align-items: center;
  padding: 8px 2px; border-bottom: 1px solid #e5d9c3; cursor: pointer;
}
.hist-item:first-child { border-top: 1px solid #e5d9c3; }
.hist-url {
  -webkit-box-flex: 1; -ms-flex: 1; flex: 1;
  color: #8b0000; font-size: 0.9em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-right: 4px;
}
.hist-del {
  color: #bbb; font-size: 1em; padding: 4px 8px;
  background: none; border: none; cursor: pointer;
  font-family: inherit; -webkit-appearance: none;
}
.hist-del:active { color: #8b0000; }

/* ── Модальное окно ── */
#modal-overlay {
  display: none; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.62); z-index: 200;
  -webkit-box-align: center; -ms-flex-align: center; align-items: center;
  -webkit-box-pack: center; -ms-flex-pack: center; justify-content: center;
}
#modal-overlay.vis {
  display: -webkit-box; display: -ms-flexbox; display: flex;
}
#modal-box {
  background: #f9f6f0; border: 1px solid #c9a96e; border-radius: 8px;
  padding: 28px 22px 20px; max-width: 310px; width: 90%;
  text-align: center;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45);
}
#modal-msg {
  font-style: italic; color: #3a1500;
  margin-bottom: 20px; line-height: 1.55; font-size: 0.98em;
}

/* ── Подвал ── */
#footer {
  width: 100%; padding: 12px 16px 18px; text-align: center;
}
.flink {
  color: #8b0000; text-decoration: underline;
  cursor: pointer; font-size: 0.82em;
  display: inline-block; margin: 3px 10px;
}
#err-msg {
  color: #8b0000; font-size: 1.2em;
  font-style: italic; padding: 20px; line-height: 1.5;
}
#bg-img {
  position: fixed; top: 50%; left: 50%; z-index: -1;
  width: 100%; height: 100%;
  -webkit-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
  display: none;
}
#bg-img.rotated {
  width: 100vh; height: 100vw;
  -webkit-transform: translate(-50%, -50%) rotate(90deg);
  transform: translate(-50%, -50%) rotate(90deg);
}
</style>
</head>
<body>
<img id="bg-img" src="" alt="">

<!-- Экран ошибки (воркер недоступен) -->
<div id="screen-error" class="screen">
  <div class="cross">✝</div>
  <div id="err-msg">Заблокировали, ироды! 8-(</div>
</div>

<!-- Экран пароля -->
<div id="screen-password" class="screen">
  <div class="cross" onclick="crossClicked=true;">✝</div>
  <h1>С Богом!</h1>
  <div class="card">
    <div class="question">Как входишь в храм? <small style="font-size:0.85em;opacity:0.75"> (5:8)</small></div>
    <div class="input-row">
      <input type="text" id="pass-input"
        placeholder="Ответ..."
        autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false">
      <button class="btn" id="pass-btn" onclick="submitPass()">&#8594;</button>
    </div>
  </div>
</div>

<!-- Экран ввода адреса -->
<div id="screen-proxy" class="screen">
  <div class="cross">✝</div>
  <h1>С Богом!</h1>
  <div class="card">
    <div class="question">Куда направить стопы?</div>
    <div class="input-row">
      <input type="url" id="url-input"
        placeholder="pravoslavie.ru"
        autocomplete="off" autocorrect="off"
        autocapitalize="none" spellcheck="false">
      <button class="btn" onclick="goToUrl(event)">&#8594;</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- Модальное окно -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-msg"></div>
    <button class="btn" onclick="closeModal()">Продолжить</button>
  </div>
</div>

<!-- Подвал -->
<div id="footer">
  <span class="flink" onclick="switchBg()">Сменить пергамент</span>
  <span class="flink" onclick="showAbout()">О немощах сего инструмента</span>
</div>

<script>
// ════════════════════════════════════════════════════
// НАСТРОЙКА — замените URL на адрес вашего воркера
// ════════════════════════════════════════════════════
var WORKER_URL = 'https://vpn4ios-dev.gsm1965.workers.dev';

// ─── Состояние ───────────────────────────────────────
var sessionToken   = null;
var modalCallback  = null;
var HIST_KEY       = 'sbogom_history';
var BG_KEY         = 'sbogom_bg';
var BG_COUNT       = 10;   // файлы 0.jpg … 9.jpg рядом с index.html
var bgIndex        = -1;   // -1 = белый
var crossClicked   = false;
var debugMode      = false;

// ─── Инициализация ───────────────────────────────────
window.onload = function() {
  loadBg();
  pingWorker();
};

// Сброс сессии при возврате через кнопку «Назад» (bfcache)
if (window.addEventListener) {
  window.addEventListener('pageshow', function(evt) {
    if (evt.persisted) {
      sessionToken = null;
      showScreen('password');
      document.getElementById('pass-input').value = '';
    }
  });
}

// ─── Экраны ──────────────────────────────────────────
function showScreen(name) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) {
    all[i].className = all[i].className.replace(/\s*active/g, '');
  }
  var s = document.getElementById('screen-' + name);
  if (s) { s.className += ' active'; }
}

// ─── Фон (пергамент) ─────────────────────────────────
function loadBg() {
  var v = localStorage.getItem(BG_KEY);
  bgIndex = (v !== null && v !== '') ? parseInt(v, 10) : 1;
  if (isNaN(bgIndex)) { bgIndex = -1; }
  applyBg();
}

function switchBg() {
  bgIndex = bgIndex + 1;
  if (bgIndex >= BG_COUNT) { bgIndex = -1; }
  try { localStorage.setItem(BG_KEY, String(bgIndex)); } catch(e) {}
  applyBg();
}

function applyBg() {
  var img = document.getElementById('bg-img');
  if (bgIndex < 0) {
    img.style.display = 'none';
    document.body.style.backgroundColor = '#ffffff';
  } else {
    document.body.style.backgroundColor = '#f9f6f0';
    img.style.display = 'block';
    img.src = bgIndex + '.jpg';
    if (img.complete) { checkBgOrientation(); }
  }
}

function checkBgOrientation() {
  var img = document.getElementById('bg-img');
  if (bgIndex < 0 || !img.naturalWidth) { return; }
  var imgPortrait = img.naturalHeight >= img.naturalWidth;
  var scrPortrait = window.innerHeight >= window.innerWidth;
  img.className = (imgPortrait !== scrPortrait) ? 'rotated' : '';
}

// ─── Модальное окно ──────────────────────────────────
function showModal(text, cb) {
  document.getElementById('modal-msg').innerHTML = text;
  document.getElementById('modal-overlay').className = 'vis';
  modalCallback = cb || null;
}

function closeModal() {
  document.getElementById('modal-overlay').className = '';
  if (modalCallback) {
    var cb = modalCallback;
    modalCallback = null;
    cb();
  }
}

// ─── XHR (без fetch — для iOS 10) ────────────────────
function doXhr(method, url, data, cb) {
  var x = new XMLHttpRequest();
  x.open(method, url, true);
  if (data) {
    x.setRequestHeader('Content-Type',
      'application/x-www-form-urlencoded; charset=UTF-8');
  }
  x.timeout = 12000;
  x.onreadystatechange = function() {
    if (x.readyState !== 4) { return; }
    if (x.status >= 200 && x.status < 600) {
      try { cb(null, JSON.parse(x.responseText)); }
      catch(e) { cb(new Error('Ответ сервера непонятен')); }
    } else {
      cb(new Error('HTTP ' + x.status));
    }
  };
  x.onerror   = function() { cb(new Error('Сеть недоступна')); };
  x.ontimeout = function() { cb(new Error('Нет ответа от сервера')); };
  x.send(data || null);
}

// ─── Пинг воркера ────────────────────────────────────
function pingWorker() {
  doXhr('GET', WORKER_URL + '?action=ping', null, function(err, data) {
    if (err || !data || !data.ok) {
      showScreen('error');
    } else {
      showScreen('password');
      // Фокус с задержкой (iOS может игнорировать ранний focus)
      setTimeout(function() {
        try { document.getElementById('pass-input').focus(); } catch(e) {}
      }, 400);
    }
  });
}

// ─── Авторизация ─────────────────────────────────────
function normalizePhrase(s) {
  return s.toLowerCase()
    .replace(/\u0451/g, '\u0435') // ё → е
    .replace(/[^а-яa-z0-9]/g, '');
}

function clientSessionCode() {
  var n = new Date();
  function p(x) { return x < 10 ? '0' + x : '' + x; }
  var s = '' + n.getUTCFullYear() + p(n.getUTCMonth() + 1) + p(n.getUTCDate());
  var h = 5381;
  for (var i = 0; i < s.length; i++) {
    h = ((h << 5) + h + s.charCodeAt(i)) & 0x7fffffff;
  }
  return String(Math.abs(h) + 100000);
}

function submitPass() {
  var raw = document.getElementById('pass-input').value;
  if (!raw.trim()) {
    if (crossClicked) {
      crossClicked = false;
      sessionToken = clientSessionCode();
      renderHistory(true);
      showScreen('proxy');
      document.getElementById('url-input').value = '';
    }
    return;
  }
  crossClicked = false;
  var phrase = normalizePhrase(raw);
  doXhr('POST', WORKER_URL + '?action=auth',
    'phrase=' + encodeURIComponent(phrase),
    function(err, data) {
      if (err || !data) {
        showModal('Не удалось связаться с сервером.<br>Проверьте соединение.');
        return;
      }
      if (data.ok) {
        sessionToken = data.session;
        showModal('Благослови Господь путь твой!', function() {
          renderHistory(true);
          showScreen('proxy');
          document.getElementById('url-input').value = '';
        });
      } else {
        document.getElementById('pass-input').value = '';
        showModal('Бог в помощь, но слова не те.');
      }
    }
  );
}

// Enter в поле пароля
document.getElementById('bg-img').onload = function() { checkBgOrientation(); };
if (window.addEventListener) {
  window.addEventListener('orientationchange', function() {
    setTimeout(checkBgOrientation, 150);
  });
  window.addEventListener('resize', checkBgOrientation);
}
document.getElementById('pass-input').onfocus = function() { crossClicked = false; };
document.getElementById('pass-input').onkeydown = function(e) {
  if ((e.keyCode || e.which) === 13) { submitPass(); }
};

// ─── История ─────────────────────────────────────────
var PINNED = [
  'http://pravoslavie.ru',
  'http://www.pravmir.ru',
  'http://calendar.rop.ru',
  'https://azbyka.ru',
  'https://www.diveevo.ru'
];

function loadHistory() {
  try {
    var raw = localStorage.getItem(HIST_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveHistory(list) {
  try { localStorage.setItem(HIST_KEY, JSON.stringify(list)); } catch(e) {}
}
function stripSlash(u) { return u.replace(/\/+$/, ''); }
  
function addToHistory(url) {
  var list = loadHistory();
  // Дедупликация
  var filtered = [];
  for (var i = 0; i < list.length; i++) {
    if (stripSlash(list[i]) !== stripSlash(url)) { filtered.push(list[i]); }
  }
  filtered.unshift(url);
  saveHistory(filtered);
}

function deleteFromHistory(idx) {
  var list = loadHistory();
  if (idx >= 0 && idx < list.length) {
    list.splice(idx, 1);
    saveHistory(list);
  }
  renderHistory(true);
}

function renderHistory(show) {
  var container = document.getElementById('history-list');
  container.innerHTML = '';
  if (!show) { return; }

  var list = loadHistory();
  for (var p = 0; p < PINNED.length; p++) {
    container.appendChild(makeHistItem(PINNED[p], -1));
  }
  for (var i = 0; i < list.length; i++) {
    var isPinned = false;
    for (var p = 0; p < PINNED.length; p++) {
      if (stripSlash(list[i]) === stripSlash(PINNED[p])) { isPinned = true; break; }
    }
    if (isPinned) { continue; }
    container.appendChild(makeHistItem(list[i], i));
  }
}

function makeHistItem(url, idx) {
  var div = document.createElement('div');
  div.className = 'hist-item';

  var span = document.createElement('span');
  span.className = 'hist-url';
  span.textContent = url.replace(/^https?:\/\//, '');
  (function(u) {
    span.onclick = function(e) {
      if (e && e.ctrlKey && e.altKey && e.shiftKey) { debugMode = true; }
      navigateTo(u);
    };
  })(url);
  div.appendChild(span);

  if (idx >= 0) {
    var btn = document.createElement('button');
    btn.className = 'hist-del';
    btn.innerHTML = '&#10005;';
    btn.title = 'Удалить';
    (function(i) {
      btn.onclick = function(e) {
        if (e && e.stopPropagation) { e.stopPropagation(); }
        deleteFromHistory(i);
      };
    })(idx);
    div.appendChild(btn);
  }
  return div;
}

// ─── Навигация ───────────────────────────────────────
function normalizeUrl(u) {
  u = (u || '').trim();
  if (!u) { u = PINNED[0]; }
  if (u.indexOf('http://') !== 0 && u.indexOf('https://') !== 0) {
    u = 'http://' + u;
  }
  return u;
}

function goToUrl(evt) {
  debugMode = !!(evt && evt.ctrlKey && evt.altKey && evt.shiftKey);
  var raw = document.getElementById('url-input').value.trim();
  navigateTo(normalizeUrl(raw));
}

function navigateTo(url) {
  if (!sessionToken) {
    showModal('Сессия истекла. Введите пароль заново.');
    showScreen('password');
    return;
  }
  url = normalizeUrl(url);
  addToHistory(url);
  // Скрываем историю немедленно
  renderHistory(false);

  var dest = WORKER_URL +
    '?url=' + encodeURIComponent(url) +
    '&session=' + encodeURIComponent(sessionToken) +
    (debugMode ? '&debug=1' : '');
  debugMode = false;
  window.location.href = dest;
}

// Enter в поле URL
document.getElementById('url-input').onkeydown = function(e) {
  if ((e.keyCode || e.which) === 13) { goToUrl(); }
};

// ─── О немощах ───────────────────────────────────────
function showAbout() {
  showModal(
    'Сайт откроется и читать его можно будет. ' +
    'Словеса, вести и образы — всё явлено будет пред тобой. ' +
    'Видение же движущееся (видео) — не запустится, скорее всего. ' +
    'И войти в кабинет личный, коли таковой имеется — тоже может не случиться. ' +
    'Но для чтения и созерцания вестей — всё устроится надлежащим образом. ' +
    'Аще не работает — да исправится.'
  );
}
</script>
</body>
</html>
